<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div class="auth-box">
      <h1 class="logo">✅ TaskApp</h1>
      <p class="auth-sub">Manage your tasks. Stay on top.</p>

      <div class="tab-row">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Login</button>
        <button class="tab" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div id="form-login">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <div id="login-error" class="error-msg"></div>
        <button class="btn-primary full" onclick="handleLogin()">Login</button>
      </div>

      <!-- SIGNUP -->
      <div id="form-signup" style="display:none">
        <div class="field">
          <label>Name</label>
          <input type="text" id="signup-name" placeholder="Your name" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" />
        </div>
        <div id="signup-error" class="error-msg"></div>
        <button class="btn-primary full" onclick="handleSignup()">Create Account</button>
      </div>

    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" class="screen" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">✅ TaskApp</div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="setFilter('all')">📋 All Tasks</button>
        <button class="nav-item" onclick="setFilter('todo')">🔵 To Do</button>
        <button class="nav-item" onclick="setFilter('in_progress')">🟡 In Progress</button>
        <button class="nav-item" onclick="setFilter('done')">🟢 Done</button>
      </nav>
      <div class="sidebar-footer">
        <span id="user-email-display"></span>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="main-header">
        <h2 id="filter-title">All Tasks</h2>
        <button class="btn-primary" onclick="openModal()">+ New Task</button>
      </div>

      <div id="ws-banner" class="ws-banner" style="display:none">⚡ Live updates active</div>

      <div id="task-list" class="task-list">
        <div class="empty-state" id="empty-state" style="display:none">
          <p>No tasks here yet.</p>
          <button class="btn-primary" onclick="openModal()">Create your first task</button>
        </div>
      </div>
    </main>
  </div>

  <!-- TASK MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Task</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="field">
        <label>Title <span class="required">*</span></label>
        <input type="text" id="task-title" placeholder="What needs to be done?" />
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="task-desc" placeholder="Optional details..." rows="3"></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Priority</label>
          <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="task-status">
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="field">
          <label>Due Date</label>
          <input type="date" id="task-due" />
        </div>
      </div>
      <div id="modal-error" class="error-msg"></div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
